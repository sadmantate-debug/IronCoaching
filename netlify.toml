headers = []
redirects = []

[functions]

  [functions.emails]
  included_files = [
    "./emails/**"
  ]

  [functions."*"]

[[plugins]]
origin = "ui"
package = "@netlify/plugin-emails"
pinned_version = "1"

  [plugins.inputs]

[build]
publish = "/opt/build/repo/dist"
publishOrigin = "ui"
commandOrigin = "ui"
command = "npm run build"

  [build.environment]

  [build.processing]

    [build.processing.css]

    [build.processing.html]

    [build.processing.images]

    [build.processing.js]

  [build.services]